<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMV MODEL - ML Prediction</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #10b981;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: #334155;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            padding: 3rem 0;
            background: linear-gradient(135deg, var(--primary) 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: var(--bg-card);
            border-radius: 50px;
            border: 1px solid var(--border);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--secondary);
            animation: pulse 2s infinite;
        }

        .status-dot.offline {
            background: var(--error);
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            header h1 {
                font-size: 2rem;
            }
        }

        .card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 2rem;
            border: 1px solid var(--border);
        }

        .card h2 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .card h2 .icon {
            width: 32px;
            height: 32px;
            background: var(--primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 1rem;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .input-group textarea {
            width: 100%;
            padding: 1rem;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            resize: vertical;
            min-height: 120px;
        }

        .input-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn.loading {
            position: relative;
            color: transparent;
        }

        .btn.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result-card {
            display: none;
        }

        .result-card.show {
            display: block;
        }

        .prediction-result {
            text-align: center;
            padding: 2rem;
            background: var(--bg-dark);
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }

        .prediction-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .prediction-value {
            font-size: 3rem;
            font-weight: 700;
            color: var(--secondary);
        }

        .confidence-bars {
            margin-top: 1.5rem;
        }

        .confidence-item {
            margin-bottom: 1rem;
        }

        .confidence-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        .confidence-bar {
            height: 8px;
            background: var(--bg-dark);
            border-radius: 4px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #8b5cf6);
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .history-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            padding: 1rem;
            background: var(--bg-dark);
            border-radius: 8px;
            margin-bottom: 0.75rem;
            border-left: 3px solid var(--primary);
        }

        .history-item .time {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .history-item .result {
            font-weight: 600;
            margin-top: 0.25rem;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 JAMV MODEL</h1>
            <p>Machine Learning Prediction API</p>
        </header>

        <div class="status-bar">
            <div class="status-item">
                <div class="status-dot" id="apiStatus"></div>
                <span>API Status</span>
            </div>
            <div class="status-item">
                <div class="status-dot" id="modelStatus"></div>
                <span>Model Status</span>
            </div>
            <div class="status-item">
                <span id="connectionStatus">Connecting...</span>
            </div>
        </div>

        <div class="main-grid">
            <div class="card">
                <h2>
                    <span class="icon">📊</span>
                    Input Features
                </h2>
                <div class="input-group">
                    <label for="features">Enter Features (comma-separated)</label>
                    <textarea id="features" placeholder="e.g., 1.2, 3.4, 5.6, 2.1, 0.8, 4.5, 3.2, 1.9"></textarea>
                </div>
                <button class="btn" id="predictBtn" onclick="makePrediction()">
                    🚀 Make Prediction
                </button>
                <div class="error-message" id="errorMessage"></div>
            </div>

            <div class="card result-card" id="resultCard">
                <h2>
                    <span class="icon">📈</span>
                    Prediction Result
                </h2>
                <div class="prediction-result">
                    <div class="prediction-label">Predicted Class</div>
                    <div class="prediction-value" id="predictedClass">-</div>
                </div>
                <div class="confidence-bars">
                    <div class="confidence-item">
                        <div class="confidence-header">
                            <span>Confidence</span>
                            <span id="confidencePercent">0%</span>
                        </div>
                        <div class="confidence-bar">
                            <div class="confidence-fill" id="confidenceFill" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card" style="margin-top: 2rem;">
            <h2>
                <span class="icon">📜</span>
                Prediction History
            </h2>
            <div class="history-list" id="historyList">
                <p style="color: var(--text-secondary); text-align: center;">No predictions yet</p>
            </div>
        </div>

        <footer>
            <p>JAMV MODEL © 2026 | Built with FastAPI + TensorFlow</p>
        </footer>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        let history = [];

        // Check API status on load
        async function checkStatus() {
            try {
                const response = await fetch(`${API_URL}/health`);
                const data = await response.json();
                
                document.getElementById('apiStatus').classList.remove('offline');
                document.getElementById('modelStatus').classList.remove('offline');
                document.getElementById('modelStatus').classList.toggle('offline', !data.model_loaded);
                document.getElementById('connectionStatus').textContent = 'Connected';
                
                return data.model_loaded;
            } catch (error) {
                document.getElementById('apiStatus').classList.add('offline');
                document.getElementById('modelStatus').classList.add('offline');
                document.getElementById('connectionStatus').textContent = 'Disconnected';
                return false;
            }
        }

        async function makePrediction() {
            const featuresInput = document.getElementById('features').value.trim();
            const predictBtn = document.getElementById('predictBtn');
            const errorMessage = document.getElementById('errorMessage');
            
            // Clear previous errors
            errorMessage.classList.remove('show');
            
            if (!featuresInput) {
                showError('Please enter features');
                return;
            }

            // Parse features
            let features;
            try {
                features = featuresInput.split(',').map(f => parseFloat(f.trim()));
                if (features.some(isNaN)) {
                    throw new Error('Invalid number');
                }
            } catch (e) {
                showError('Please enter valid comma-separated numbers');
                return;
            }

            // Show loading state
            predictBtn.classList.add('loading');
            predictBtn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/predict`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ features: features }),
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.statusText}`);
                }

                const data = await response.json();
                displayResult(data);
                addToHistory(features, data);
                
            } catch (error) {
                showError(`Prediction failed: ${error.message}`);
            } finally {
                predictBtn.classList.remove('loading');
                predictBtn.disabled = false;
            }
        }

        function displayResult(data) {
            const resultCard = document.getElementById('resultCard');
            const predictedClass = document.getElementById('predictedClass');
            const confidencePercent = document.getElementById('confidencePercent');
            const confidenceFill = document.getElementById('confidenceFill');

            resultCard.classList.add('show');
            predictedClass.textContent = data.predicted_class;
            
            // Calculate max confidence
            const maxConfidence = Math.max(...data.confidence);
            const percent = (maxConfidence * 100).toFixed(1);
            
            confidencePercent.textContent = `${percent}%`;
            confidenceFill.style.width = `${percent}%`;
        }

        function addToHistory(features, result) {
            const historyItem = {
                time: new Date().toLocaleTimeString(),
                features: features.join(', '),
                result: result.predicted_class,
                confidence: Math.max(...result.confidence) * 100
            };
            
            history.unshift(historyItem);
            if (history.length > 10) history.pop();
            
            renderHistory();
        }

        function renderHistory() {
            const historyList = document.getElementById('historyList');
            
            if (history.length === 0) {
                historyList.innerHTML = '<p style="color: var(--text-secondary); text-align: center;">No predictions yet</p>';
                return;
            }

            historyList.innerHTML = history.map(item => `
                <div class="history-item">
                    <div class="time">${item.time}</div>
                    <div>Input: [${item.features}]</div>
                    <div class="result">Class: ${item.result} (${item.confidence.toFixed(1)}%)</div>
                </div>
            `).join('');
        }

        function showError(message) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        // Initialize
        checkStatus();
        setInterval(checkStatus, 30000);
    </script>
</body>
</html>
